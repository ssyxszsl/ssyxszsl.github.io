  # 项目经历
  # ----------------------------------------------------------

  projects:
    - title              : "基于风险感知自进化强化学习的自动驾驶决策与规划系统研究"
      period             : "2025.10 - 2026.06"
      role               : "负责人"
      program            : "面上项目"

      description        : "面向高速、多车密集交互驾驶场景，构建“强化学习决策—模型预测控制规划—在线风险监督”一体化系统，使驾驶策略能够持续适应动态交通风险，并兼顾通行效率、舒适性、安全性与鲁棒性。"

      highlights:
        - "构建风险感知强化学习决策框架：融合自车与周围车辆状态，基于 SAC 输出目标速度与横向位置的高层交互决策，实现跟驰、换道与超车行为优化。"
        - "设计自进化风险学习机制：构建风险价值网络预测短时碰撞风险，利用最新交互数据周期性更新，并将风险估计用于奖励塑形，驱动策略持续向低风险行为演化。"
        - "实现安全规划与在线兜底：将 SAC 决策嵌入 MPC 轨迹优化，结合车辆动力学、道路边界与碰撞规避约束生成可行轨迹；风险超过阈值时切换保守策略，实现在线安全监督。"

      validation          : "完成硬件在环实验验证"

      outputs:
        - "Shaoyang Shi, et al. A Risk-Aware Decision Making and Motion Planning Framework for Interactive Autonomous Driving. 2026 IEEE 29th International Conference on Intelligent Transportation Systems (ITSC), 2026: 399-406."
        - "Shaoyang Shi et al. Policy-conditioned Risk-aware Safe Reinforcement Learning with Model-Based Planning for Autonomous Driving. Expert Systems with Applications. Under review."


    - title              : "感知不确定性驱动的自动驾驶风险自适应轨迹规划系统"
      period             : "2024.04 - 2026.03"
      focused_period     : "2025.04 - 2025.12"
      role               : "负责人"
      program            : "国家重点研发计划子课题"

      description        : "面向遮挡、传感器噪声与长尾目标导致感知不确定性显著上升的复杂驾驶场景，构建感知不确定性驱动的风险自适应轨迹规划框架，实现感知可靠性量化、风险建模与规划决策的协同优化。"

      highlights:
        - "构建感知不确定性量化模型：基于 Monte Carlo Dropout 改进 PointPillars 三维目标检测器，联合建模分类不确定性与定位回归不确定性，输出目标级感知风险指标。"
        - "设计不确定性自适应 MPC 规划器：将周车感知不确定性引入轨迹跟踪权重、碰撞规避权重与障碍物势场；感知风险升高时自动扩大安全距离并降低激进跟踪行为，实现安全性与通行效率的动态权衡。"
        - "实现时序风险传播与车辆约束规划：融合多帧检测与跟踪信息平滑不确定性估计，结合车辆动力学、道路边界和执行器约束生成连续可行的安全轨迹。"

      outputs:
        - "Shaoyang Shi et al. Perceptual Uncertainty-aware Trajectory Planning for Autonomous Vehicles. IEEE Transactions on Vehicular Technology. Under review."
        - "秦也辰、史少阳等：一种自动驾驶轨迹规划方法、系统、设备、介质及产品（发明专利，实质审查）。"
        - "秦也辰、史少阳等：一种面向自动驾驶的感知不确定性评估方法（发明专利，实质审查）。"


    - title              : "面向非结构化地形的无人平台可通行性建模与自适应路径规划"
      period             : "2024.01 - 2026.06"
      role               : "主要参与"

      description        : "面向坡面、台阶、碎石和起伏地形等复杂非结构化环境，构建基于平台通行能力与稳定性约束的可通行性路径规划框架，通过地形特征生成连续可通行性代价地图，实现面向不同平台能力的自适应安全路径规划。"

      highlights:
        - "构建地形可通行性评估模型：基于 LiDAR 与 IMU 构建高程地图，提取坡度、台阶高度和地形粗糙度等特征，将几何环境转换为连续可通行性代价。"
        - "设计平台能力参数化机制：将离地间隙、最大爬坡角、越障高度、可接受粗糙度与横向稳定性约束映射到代价地图，使同一规划器能够适配不同机动能力的平台。"
        - "改进全局路径搜索算法：在节点扩展代价中融合地形风险、曲率变化与换向惩罚，并在启发函数中加入最小地形代价下界，生成兼顾安全性、平滑性和可执行性的路径。"

      outputs:
        - "Yifei Han, Shaoyang Shi, et al. Optimized 3D Path Planning for Unmanned Platforms in Complex Unstructured Environments. 2024 8th CAA International Conference on Vehicular Control and Intelligence (CVCI), 2024."
        - "Xiaoxi Nie, Shaoyang Shi, et al. Navigation of Ground Unmanned Platforms with Adaptive Traversability in Unstructured Terrain. 2026 10th CAA International Conference on Vehicular Control and Intelligence (CVCI). Under review."


    - title              : "分辨率自适应高程建图与路面预瞄感知系统"
      period             : "2023.04 - 2025.12"
      role               : "负责人"

      description        : "面向智能悬架与底盘控制的路面预瞄需求，构建融合点云分割、属性感知更新与自适应分辨率优化的道路表面预瞄方法，为智能车辆底盘和悬架控制提供高精度前视路面信息。"

      highlights:
        - "构建属性感知高程建图方法：基于局部 RANSAC 点云分割区分地面点与非地面点，并设计差异化地图更新策略，提高障碍物与路面区域的高程重建精度。"
        - "设计分辨率自适应优化算法：基于栅格高程方差构建四叉树细分机制，在平坦区域保持低分辨率，在起伏区域动态加密，实现精度与计算开销的平衡。"
        - "完成仿真与实车验证：结合车辆运动学模型预测四轮轨迹，通过轮宽范围内的加权高程提取生成前方路面高程信息。"

      outputs:
        - "Shaoyang Shi et al. Resolution-adaptive elevation mapping based road surface preview method for intelligent vehicles. Measurement, 2026, 272: 121066."
        - "秦也辰、史少阳等：一种基于点云输入的路面预瞄方法、系统、设备及介质（发明专利）。"


  # ----------------------------------------------------------
