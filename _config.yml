# 二十五、Jekyll 插件
# ============================================================

plugins:

  - jekyll-feed

  - jekyll-gist

  - jekyll-paginate

  - jekyll-sitemap

  - jekyll-redirect-from

  - jemoji


# ============================================================
# 二十六、GitHub Pages 安全模式插件白名单
# ============================================================

whitelist:

  - jekyll-feed

  - jekyll-gist

  - jekyll-paginate

  - jekyll-sitemap

  - jekyll-redirect-from

  - jemoji


# ============================================================
# 二十七、分类与标签归档
# ============================================================

category_archive:

  type                   : liquid

  path                   : /categories/


tag_archive:

  type                   : liquid

  path                   : /tags/


# 如自行部署并安装 jekyll-archives，
# 可以启用下面的配置。
#
# jekyll-archives:
#
#   enabled:
#     - categories
#     - tags
#
#   layouts:
#     category           : archive-taxonomy
#     tag                : archive-taxonomy
#
#   permalinks:
#     category           : /categories/:name/
#     tag                : /tags/:name/


# ============================================================
# 二十八、HTML 压缩
# ============================================================

compress_html:

  clippings              : all

  ignore:

    envs                 : development
