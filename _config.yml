# ============================================================
# 网站通用设置
# ============================================================

teaser                   :
breadcrumbs              : false

# 中文内容阅读速度通常高于英文，适当提高估算值。
words_per_minute         : 300

# 允许显示未来日期的论文或项目页面。
future                   : true

read_more                : "disabled"
talkmap_link             : false


# ============================================================
# 评论和订阅
# 个人学术主页默认关闭评论与 RSS 入口。
# ============================================================

comments:
  provider               : false

atom_feed:
  hide                   : true
  path                   :


# ============================================================
# 社交分享与结构化数据
# ============================================================

og_image                 : "/images/profile.png"
og_description           : *description

social:
  type                   : "Person"
  name                   : *name

  links:
    - "https://ssyxszsl.github.io"
    - "https://github.com/ssyxszsl"


# ============================================================
# 网站访问统计
# 如需启用 Google Analytics，可之后补充配置。
# ============================================================

analytics:
  provider               : false


# ============================================================
# Jekyll 文件读取设置
# ============================================================

include:
  - .htaccess
  - _pages
  - files

exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Capfile
  - config
  - Dockerfile
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - local
  - log
  - node_modules
  - package.json*
  - Rakefile
  - README
  - tmp
  - vendor

keep_files:
  - .git
  - .svn

encoding                 : "utf-8"
markdown_ext             : "markdown,mkdown,mkdn,mkd,md"


# ============================================================
# Markdown 转换设置
# ============================================================

markdown                 : kramdown
highlighter              : rouge
lsi                      : false
excerpt_separator        : "\n\n"
incremental              : false

kramdown:
  input                  : GFM
  hard_wrap              : false
  auto_ids               : true
  footnote_nr            : 1
  entity_output          : as_char
  toc_levels             : "1..6"
  smart_quotes           : "lsquo,rsquo,ldquo,rdquo"
  enable_coderay         : false


# ============================================================
# 内容集合
#
# 简历中没有教学和学术报告内容，因此仅保留论文与项目集合。
#
# publications 对应科研成果。
# portfolio 对应项目经历和竞赛经历。
# ============================================================

collections:
  publications:
    output               : true
    permalink            : /publications/:path/

  portfolio:
    output               : true
    permalink            : /projects/:path/


# ============================================================
# 页面与集合的默认设置
# ============================================================

defaults:
  # 普通页面
  - scope:
      path                : ""
      type                : pages

    values:
      layout              : single
      author_profile      : true
      comments            : false
      share               : false


  # 科研成果页面
  - scope:
      path                : ""
      type                : publications

    values:
      layout              : single
      author_profile      : true
      comments            : false
      share               : true


  # 项目经历页面
  - scope:
      path                : ""
      type                : portfolio

    values:
      layout              : single
      author_profile      : true
      comments            : false
      share               : false


# ============================================================
# Sass / SCSS 样式
# ============================================================

sass:
  sass_dir                : _sass
  style                   : compressed


# ============================================================
# 网站输出设置
# ============================================================

permalink                 : /:categories/:title/
timezone                  : "Asia/Shanghai"


# ============================================================
# GitHub Pages 插件
# ============================================================

plugins:
  - jekyll-sitemap
  - jekyll-redirect-from

whitelist:
  - jekyll-sitemap
  - jekyll-redirect-from


# ============================================================
# HTML 压缩
# ============================================================

compress_html:
