# ============================================================
# 十一、网站通用设置
# ============================================================

# 页面没有设置预览图时使用的默认图片
# 文件应放在 images/profile.png
teaser                   : "profile.png"

# 是否显示面包屑导航
breadcrumbs              : false

# 阅读速度
# 中文阅读速度与英文不同，因此设置为 300
words_per_minute         : 300

# 是否构建日期在未来的内容
# 部分论文和项目使用 2026 年日期，因此保持开启
future                   : true

# 是否显示“阅读全文”
read_more                : "disabled"

# 是否在学术报告页面显示地图
talkmap_link             : false


# ============================================================
# 十二、评论系统
#
# 个人学术主页默认不启用评论。
# ============================================================

comments:

  provider               : false

  disqus:
    shortname            :

  discourse:
    server               :

  facebook:
    appid                :
    num_posts            :
    colorscheme          :


# ============================================================
# 十三、Staticman 评论配置
#
# 当前评论系统关闭，本部分仅保留兼容配置。
# ============================================================

staticman:

  allowedFields:
    - "name"
    - "email"
    - "url"
    - "message"

  branch                 : "main"

  commitMessage          : "收到一条新评论。"

  filename               : "comment-{@timestamp}"

  format                 : "yml"

  moderation             : true

  path                   : "_data/comments/{options.slug}"

  requiredFields:
    - "name"
    - "email"
    - "message"

  transforms:
    email                : "md5"

  generatedFields:
    date:
      type               : "date"
      options:
        format           : "iso8601"


# ============================================================
# 十四、RSS / Atom Feed
#
# 当前网站以个人简历和科研展示为主，默认隐藏 RSS。
# 后续开设博客时可改为 false。
# ============================================================

atom_feed:

  hide                   : true

  path                   :


