# ============================================================
# 十七、网站访问统计
#
# 当前关闭。
#
# 如需启用 Google Analytics 4，可修改为：
#
# analytics:
#   provider: "google-analytics-4"
#   google:
#     tracking_id: "G-XXXXXXXXXX"
# ============================================================

analytics:

  provider               : "false"

  google:

    tracking_id          :


# ============================================================
# 十八、Jekyll 文件读取设置
# ============================================================

include:

  - .htaccess

  - _pages

  - files


exclude:

  - "*.sublime-project"

  - "*.sublime-workspace"

  - .asset-cache

  - .bundle

  - .github

  - .jekyll-assets-cache

  - .sass-cache

  - assets/js/_main.js

  - assets/js/plugins

  - assets/js/vendor

  - CHANGELOG

  - Capfile

  - config

  - Dockerfile

  - Gemfile

  - Gruntfile.js

  - gulpfile.js

  - LICENSE

  - local

  - log

  - node_modules

  - package.json*

  - Rakefile

  - README

  - tmp

  - vendor


keep_files:

  - .git

  - .svn


encoding                 : "utf-8"

markdown_ext             : "markdown,mkdown,mkdn,mkd,md"


# ============================================================
# 十九、Markdown 转换设置
# ============================================================

markdown                 : kramdown

highlighter              : rouge

lsi                      : false

excerpt_separator        : "\n\n"

incremental              : false


# ============================================================
# 二十、Kramdown Markdown 设置
# ============================================================

kramdown:

  input                  : GFM

  hard_wrap              : false

  auto_ids               : true

  footnote_nr            : 1

  entity_output          : as_char

  toc_levels             : 1..6

  smart_quotes           : lsquo,rsquo,ldquo,rdquo

  enable_coderay         : false


# ============================================================
# 二十一、内容集合
#
# teaching：
#   教学经历
#
# publications：
#   期刊论文、会议论文和专利
#
# portfolio：
#   Academic Pages 原有的项目集合
#
# projects：
#   新增的项目集合，可创建 _projects 目录
#
# talks：
#   学术报告、会议报告
# ============================================================

collections:

  teaching:

    output               : true

    permalink            : /teaching/:path/


  publications:

    output               : true

    permalink            : /publications/:path/


  portfolio:

    output               : true

    permalink            : /portfolio/:path/


  projects:

    output               : true

    permalink            : /projects/:path/


  talks:

    output               : true

    permalink            : /talks/:path/


# ============================================================
# 二十二、页面与集合的默认设置
# ============================================================

defaults:

  # ----------------------------------------------------------
  # 博客文章
  # ----------------------------------------------------------

  - scope:

      path                : ""

      type                : posts

    values:

      layout              : single

      author_profile      : true

      read_time           : true

      comments            : false

      share               : false

      related             : false


  # ----------------------------------------------------------
  # 普通页面
  # ----------------------------------------------------------

  - scope:

      path                : ""

      type                : pages

    values:

      layout              : single

      author_profile      : true

      comments            : false

      share               : false


  # ----------------------------------------------------------
  # 教学经历
  # ----------------------------------------------------------

  - scope:

      path                : ""

      type                : teaching

    values:

      layout              : single

      author_profile      : true

      share               : false

      comments            : false


  # ----------------------------------------------------------
  # 论文成果
  # ----------------------------------------------------------

  - scope:

      path                : ""

      type                : publications

    values:

      layout              : single

      author_profile      : true

      share               : true

      comments            : false


  # ----------------------------------------------------------
  # Academic Pages 原有 Portfolio
  # ----------------------------------------------------------

  - scope:

      path                : ""

      type                : portfolio

    values:

      layout              : single

      author_profile      : true

      share               : false

      comments            : false


  # ----------------------------------------------------------
  # 自定义科研项目
  # ----------------------------------------------------------

  - scope:

      path                : ""

      type                : projects

    values:

      layout              : single

      author_profile      : true

      share               : false

      comments            : false


  # ----------------------------------------------------------
  # 学术报告
  # ----------------------------------------------------------

  - scope:

      path                : ""

      type                : talks

    values:

      layout              : talk

      author_profile      : true

      share               : true

      comments            : false


# ============================================================
# 二十三、Sass / SCSS 样式
# ============================================================

sass:

  sass_dir                : _sass

  style                   : compressed


# ============================================================
# 二十四、网站输出设置
# ============================================================

permalink                 : /:categories/:title/

# 网站以中国标准时间为准
timezone                  : "Asia/Shanghai"


