# ============================================================
# 三、个人主页扩展信息
#
# 以下字段不是 Academic Pages 的强制字段，
# 但可以在 Markdown、HTML 或 Liquid 模板中调用。
#
# 示例：
# {{ site.profile.current_status }}
#
# 遍历研究方向：
# {% for item in site.research_interests %}
#   <li>{{ item }}</li>
# {% endfor %}
# ============================================================

profile:

  current_status         : "北京理工大学车辆工程硕博连读研究生"

  degree                 : "工学博士研究生"

  expected_graduation    : "2027 年 6 月"

  university             : "北京理工大学"

  school                 : "机械与车辆学院"

  major                  : "车辆工程"

  advisor                : "秦也辰 教授"

  undergraduate_school   : "北京化工大学"

  undergraduate_major    : "机械工程"

  undergraduate_rank     : "专业第 1 名，共 125 人"

  research_summary       : "面向复杂交通环境中的智能车辆安全决策、轨迹规划与运动控制问题，研究风险感知强化学习、模型预测控制、感知不确定性建模、三维环境感知及无人平台路径规划方法。"

  career_focus           : "智能驾驶决策、规划与控制算法研究及开发"


# ============================================================
# 四、研究方向
#
# 可在首页、About 页面或 Research 页面中读取。
# ============================================================

research_interests:

  - "智能车辆决策与运动规划"

  - "风险感知与安全强化学习"

  - "模型预测控制与车辆运动控制"

  - "感知不确定性评估与风险建模"

  - "自动驾驶轨迹规划与碰撞规避"

  - "激光雷达点云处理与三维目标检测"

  - "高程地图、路面预瞄与环境建图"

  - "非结构化环境可通行性分析与路径规划"


# ============================================================
# 五、技术能力
#
# 这些是自定义字段，可通过 site.technical_skills 调用。
# ============================================================

technical_skills:

  planning_and_control:

    title               : "智能驾驶规划与控制"

    items:

      - "路径规划与轨迹规划"

      - "模型预测控制（MPC）"

      - "车辆运动学与动力学约束规划"

      - "强化学习算法：SAC、DDPG"

      - "风险感知安全决策"

      - "轨迹跟踪与横纵向控制"


  perception_and_mapping:

    title               : "感知、定位与建图"

    items:

      - "激光雷达点云处理"

      - "三维目标检测"

      - "感知不确定性量化"

      - "SLAM 与环境建图"

      - "高程地图构建"

      - "非结构化地形可通行性分析"


  programming:

    title               : "编程与开发"

    items:

      - "Python"

      - "C++"

      - "MATLAB"

      - "Linux"

      - "ROS"

      - "Git"


  deep_learning:

    title               : "深度学习与数据处理"

    items:

      - "PyTorch"

      - "PointNet"

      - "PointPillars"

      - "CenterPoint"

      - "BEV 感知方法"

      - "Monte Carlo Dropout"

      - "Origin 数据分析与绘图"


  simulation_and_testing:

    title               : "仿真与测试"

    items:

      - "CARLA 闭环仿真"

      - "PRESCAN 闭环仿真"

      - "硬件在环测试"

      - "自动驾驶算法场景测试"

      - "实车数据处理与结果分析"


# ============================================================
# 六、代表性教育经历
#
# 自定义字段，适合在首页自动生成教育背景。
# ============================================================

