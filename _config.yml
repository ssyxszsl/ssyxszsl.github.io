        - "设计场景识别器以及适用于大曲率场景的采样式 IDM 规划算法。"
        - "设计基于周围车辆与交通灯的自适应参考车速模块。"
        - "在规划算法中加入考虑横摆角速度约束的限速机制，并在跟踪算法中设计基于曲率与车速的自适应预瞄距离，避免大曲率弯道中的控制输出过大。"

