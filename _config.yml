# ============================================================
# Academic Pages / Jekyll 全局配置
#
# 本文件用于配置网站名称、作者信息、SEO、内容集合和插件等。
# 修改本文件后，本地运行时需要停止并重新启动 Jekyll：
#
# bundle exec jekyll serve -l -H localhost
#
# 网站地址：
# https://ssyxszsl.github.io
# ============================================================


# ============================================================
# 一、网站基础信息
# ============================================================

# 中文语言环境
locale                   : "zh-CN"

# 可选主题：
# default、air、sunrise、mint、dirt、contrast
#
# air 风格简洁、留白较多，适合作为个人学术主页和网页简历
site_theme               : "air"

# 网站主标题
title                    : "史少阳｜智能车辆规划与控制"

# 浏览器标题中使用的分隔符
title_separator          : "-"

# 网站名称
name                     : &name "史少阳"

# 网站默认描述
# 用于搜索引擎、页面元信息和社交平台分享
description              : &description "史少阳的个人学术主页。北京理工大学车辆工程硕博连读研究生，研究方向包括智能车辆决策与规划、风险感知强化学习、模型预测控制、感知不确定性评估、三维环境感知与路径规划。"

# GitHub Pages 网站地址
url                      : "https://ssyxszsl.github.io"

# 用户主页仓库不需要子路径
baseurl                  : ""

# GitHub 仓库名称
repository               : "ssyxszsl/ssyxszsl.github.io"


# ============================================================
# 二、作者信息
#
# 这些信息通常显示在网页左侧作者栏。
# 留空的字段一般不会显示。
# 作者栏模板位于：
# _includes/author-profile.html
# ============================================================

author:

  # ----------------------------------------------------------
  # 基本信息
  # ----------------------------------------------------------

  # 请将头像保存为：
  # images/profile.png
  avatar           : "profile.png"

  name             : "史少阳"

  # 英文姓名不是 Academic Pages 默认字段，
  # 但可以在自定义页面中通过 site.author.english_name 调用
  english_name     : "Shaoyang Shi"

  pronouns         :

  # 左侧作者栏建议保持简洁
  bio              : "北京理工大学车辆工程硕博连读研究生，研究智能车辆决策、规划、控制与安全。预计于 2027 年 6 月毕业。"

  location         : "北京，中国"

  employer         : "北京理工大学"

  # 个人网站主页
  uri              : "https://ssyxszsl.github.io"

  # 学校邮箱
  email            : "shishaoyang@bit.edu.cn"

  # 建议不要在公开 GitHub 仓库中直接保存手机号
  phone            :


  # ----------------------------------------------------------
  # 学术平台
  #
  # 已经注册相应平台后，再填写完整主页 URL。
  # 不要填写示例地址，否则网页会显示错误链接。
