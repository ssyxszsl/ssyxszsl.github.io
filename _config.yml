  name             : "Shi shaoyang | 史少阳"
  avatar           : "images/ssy.png"
  bio              : "PhD Candidate @ Beijing Institute of Technology"
  location         : "Beijing, China"
  employer         :
  pubmed           : 
  googlescholar    : 
  email            : "15117993722@163.com"
  researchgate     : 
  uri              :
  bitbucket        :
  codepen          :
  dribbble         :
  flickr           :
